<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanka</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
            cursor: pointer;
            user-select: none;
        }
        h1 {
            color: #FFD700;
            font-size: 2em;
            text-align: center;
            margin-bottom: 24px;
            text-shadow: 0 0 10px #FFD700, 0 0 25px #FFA500;
            animation: pulse 1.4s ease-in-out infinite;
            padding: 0 20px;
            z-index: 10;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }
        .gif-wrapper {
            z-index: 10;
            animation: spin 4s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        img {
            max-width: 280px;
            max-height: 280px;
            object-fit: contain;
            display: block;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .burst {
            position: fixed;
            pointer-events: none;
            font-size: 2em;
            z-index: 999;
            animation: burstAnim 0.7s ease-out forwards;
            transform-origin: center;
        }
        @keyframes burstAnim {
            0%   { opacity: 1; transform: scale(0.5); }
            60%  { opacity: 1; transform: scale(1.6); }
            100% { opacity: 0; transform: scale(2.2); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <h1>🍆 Chestito Vanka! Pechelish kura mi qnko! 🍆</h1>
    <div class="gif-wrapper">
        <img src="pepe" alt="pepe">
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // --- Falling eggplants ---
        const COUNT = 30;
        const EMOJI = '🍆';
        const particles = [];

        for (let i = 0; i < COUNT; i++) {
            particles.push(makeParticle(true));
        }

        function makeParticle(random) {
            return {
                x: Math.random() * window.innerWidth,
                y: random ? Math.random() * window.innerHeight : -40,
                size: Math.random() * 20 + 22,
                speed: Math.random() * 1.8 + 0.8,
                drift: (Math.random() - 0.5) * 1.2,
                spin: (Math.random() - 0.5) * 0.06,
                angle: Math.random() * Math.PI * 2,
                opacity: Math.random() * 0.4 + 0.6
            };
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = p.opacity;
                ctx.font = p.size + 'px serif';
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillText(EMOJI, -p.size / 2, p.size / 2);
                ctx.restore();

                p.y += p.speed;
                p.x += p.drift;
                p.angle += p.spin;

                if (p.y > canvas.height + 50) {
                    Object.assign(p, makeParticle(false));
                }
            }

            requestAnimationFrame(draw);
        }

        draw();

        // --- Click burst effect ---
        document.addEventListener('click', function(e) {
            const count = 8;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.classList.add('burst');
                el.textContent = EMOJI;

                const angle = (i / count) * 2 * Math.PI;
                const dist = Math.random() * 60 + 30;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;

                el.style.left = (e.clientX - 16) + 'px';
                el.style.top  = (e.clientY - 16) + 'px';
                el.style.fontSize = (Math.random() * 16 + 20) + 'px';

                el.style.animation = 'none';
                document.body.appendChild(el);

                // trigger reflow
                el.getBoundingClientRect();

                el.style.transition = 'transform 0.6s ease-out, opacity 0.6s ease-out';
                el.style.transform = `translate(${dx}px, ${dy}px) scale(1.4)`;
                el.style.opacity = '0';

                setTimeout(() => el.remove(), 700);
            }
        });
    </script>
</body>
</html>
